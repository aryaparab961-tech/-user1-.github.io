<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔧 Pipe Fixing Hero</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS", cursive;
  background:linear-gradient(#6dd5fa,#2980b9);
  text-align:center;
  overflow:hidden;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#2c3e50;
  color:white;
  padding:10px 18px;
  border-radius:25px;
  text-decoration:none;
}

.game-box{
  background:white;
  width:90%;
  max-width:700px;
  margin:80px auto;
  padding:25px;
  border-radius:25px;
}

.info{
  font-size:20px;
  margin-bottom:15px;
}

.city{
  position:relative;
  height:360px;
  background:#dfe6e9;
  border-radius:20px;
  overflow:hidden;
  border:5px solid #0984e3;
}

/* Pipes */
.pipe{
  position:absolute;
  font-size:55px;
  cursor:pointer;
  user-select:none;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<a href="../menu.html" class="back-btn">⬅ Back</a>

<div class="game-box">
  <h1>🔧 Pipe Fixing Hero</h1>
  <p>Fix leaking pipes & save water 💧</p>

  <div class="info">
    Score: <span id="score">0</span> |
    Attempts: <span id="attempts">5</span>
  </div>

  <div class="city" id="city"></div>
</div>

<script>
const city = document.getElementById("city");
const scoreEl = document.getElementById("score");
const attemptsEl = document.getElementById("attempts");

let score = 0;
let attempts = 5;
let gameOver = false;

function createPipe(){
  if(gameOver) return;

  const pipe = document.createElement("div");
  pipe.className = "pipe";
  pipe.innerText = "🚿💥";

  pipe.style.left = Math.random()*600 + "px";
  pipe.style.top = Math.random()*280 + "px";

  city.appendChild(pipe);

  let fixed = false;

  pipe.onclick = () => {
    fixed = true;
    score++;
    scoreEl.innerText = score;
    pipe.innerText = "🔧✅";
    setTimeout(() => pipe.remove(), 300);
  };

  setTimeout(() => {
    if(!fixed){
      attempts--;
      attemptsEl.innerText = attempts;
      pipe.remove();
      checkGame();
    }
  }, 2500);
}

function checkGame(){
  if(attempts <= 0){
    gameOver = true;
    alert(`🚰 Water Saved!\nPipes Fixed: ${score}`);
    window.location.href = "../menu.html";
  }
}

setInterval(() => {
  if(!gameOver) createPipe();
}, 1200);
</script>

</body>
</html>
