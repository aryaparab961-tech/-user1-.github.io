<!DOCTYPE html>
<html>
<head>
  <title>🐒 Monkey Mind Quiz</title>

  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(#27ae60, #145a32);
      overflow: hidden;
      color: #fff;
      text-align: center;
    }

    /* Moving animals */
    .animal {
      position: absolute;
      font-size: 48px;
      animation: move 12s linear infinite;
      opacity: 0.8;
    }

    .monkey { top: 15%; left: -20%; animation-duration: 14s; }
    .bird { top: 40%; left: -25%; animation-duration: 10s; }
    .elephant { top: 65%; left: -30%; animation-duration: 18s; }

    @keyframes move {
      from { transform: translateX(-200px); }
      to { transform: translateX(120vw); }
    }

    .game-box {
      background: rgba(0,0,0,0.5);
      width: 85%;
      max-width: 650px;
      margin: 80px auto;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 0 25px #000;
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 22px;
      margin: 20px 0;
    }

    .option {
      background: #f9e79f;
      color: #000;
      padding: 15px;
      margin: 10px 0;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #f7dc6f;
      transform: scale(1.05);
    }

    .info {
      margin-top: 10px;
      font-size: 18px;
    }

    .btn {
      background: #e67e22;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 15px;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn:hover {
      background: #d35400;
    }
  </style>
</head>

<body>
  <a href="../menu.html" class="back-btn">⬅ Back</a>

  <!-- Background animals -->
  <div class="animal monkey">🐒</div>
  <div class="animal bird">🦜</div>
  <div class="animal elephant">🐘</div>

  <div class="game-box">
    <h1>🐒 Monkey Mind Quiz</h1>

    <div class="question" id="question"></div>
    <div id="options"></div>

    <div class="info" id="attemptInfo"></div>
    <div class="info" id="scoreInfo"></div>

    <button class="btn" onclick="nextQuestion()">Next ➡️</button>
  </div>

  <script>
    const questions = [
      { q: "Where do monkeys mostly live?", o: ["Ocean", "Jungle", "Desert"], a: 1 },
      { q: "What food do monkeys like most?", o: ["Bananas", "Plastic", "Stones"], a: 0 },
      { q: "Why should we protect forests?", o: ["For animals & oxygen", "For roads", "For noise"], a: 0 },
      { q: "Which action helps animals?", o: ["Cut trees", "Save forests", "Pollute water"], a: 1 },
      { q: "Monkeys help nature by:", o: ["Spreading seeds", "Burning trees", "Wasting food"], a: 0 },
      { q: "What should we do with waste?", o: ["Throw anywhere", "Recycle it", "Burn it"], a: 1 },
      { q: "Which animal lives in trees?", o: ["Monkey", "Fish", "Camel"], a: 0 },
      { q: "Why animals need clean water?", o: ["To drink", "To pollute", "To block rivers"], a: 0 },
      { q: "Cutting forests causes:", o: ["More animals", "Less oxygen", "More rain"], a: 1 },
      { q: "Best way to save wildlife?", o: ["Protect habitats", "Hunt animals", "Destroy forests"], a: 0 }
    ];

    let current = 0;
    let score = 0;
    let attemptsLeft = 2;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const attemptInfo = document.getElementById("attemptInfo");
    const scoreInfo = document.getElementById("scoreInfo");

    function loadQuestion() {
      attemptsLeft = 2;
      optionsEl.innerHTML = "";
      questionEl.innerText = `Q${current + 1}. ${questions[current].q}`;
      attemptInfo.innerText = `Attempts left: ${attemptsLeft}`;
      scoreInfo.innerText = `Score: ${score}/${questions.length}`;

      questions[current].o.forEach((opt, index) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = opt;
        div.onclick = () => checkAnswer(index);
        optionsEl.appendChild(div);
      });
    }

    function checkAnswer(choice) {
      if (choice === questions[current].a) {
        alert("🎉 Correct! Well done!");
        score++;
        saveData();
        nextQuestion();
      } else {
        attemptsLeft--;
        if (attemptsLeft > 0) {
          alert("❌ Wrong! Try again!");
          attemptInfo.innerText = `Attempts left: ${attemptsLeft}`;
        } else {
          alert("❌ No attempts left! Moving on...");
          saveData();
          nextQuestion();
        }
      }
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        alert(`🏆 Quiz Finished!\nYour Score: ${score}/${questions.length}`);
        saveData(true);
        window.location.href = "../index.html";
      }
    }

    function saveData(final = false) {
      let data = JSON.parse(localStorage.getItem("gameData")) || {};

      if (!data.monkeyQuiz) {
        data.monkeyQuiz = { plays: 0, bestScore: 0 };
      }

      if (final) data.monkeyQuiz.plays++;
      data.monkeyQuiz.bestScore = Math.max(data.monkeyQuiz.bestScore, score);

      localStorage.setItem("gameData", JSON.stringify(data));
    }

    loadQuestion();
  </script>

</body>
</html>
