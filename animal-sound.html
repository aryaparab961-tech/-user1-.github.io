<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal Sound Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#81c784, #2e7d32);
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}

.animal {
    width: 100px;
    height: 100px;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.back-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 10px 20px;
    background: orange;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>🐾 Animal Sound Game 🔊</h1>
<p>Click an animal to hear its sound</p>

<div class="grid">
    <div class="animal" onclick="play('tiger')">🐅</div>
    <div class="animal" onclick="play('dog')">🐶</div>
    <div class="animal" onclick="play('cat')">🐱</div>
    <div class="animal" onclick="play('cow')">🐄</div>
</div>

<a href="../menu.html" class="back-btn">⬅ Back to Menu</a>

<!-- ✅ WORKING AUDIO LINKS -->
<audio id="tiger" src="Tiger.mp3"></audio>
<audio id="dog" src="Dog.mp3"></audio>
<audio id="cat" src="Cat.mp3"></audio>
<audio id="cow" src="Cow.mp3"></audio>

<script>
function play(animal) {
    let sound = document.getElementById(animal);

    if (!sound) return;

    sound.currentTime = 0;
    sound.volume = 1.0;

    sound.play(); // ❌ no alert, just play
}
</script>

</body>
</html>
