<!DOCTYPE html>
<html>
<head>
  <title>Animal Journey</title>
  <style>
    body {
      text-align:center;
      font-family:sans-serif;
      background:#e9f5db;
    }

    h2 {
      margin-top:20px;
    }

    .container {
      margin-top:30px;
    }

    .btn {
      display:block;
      width:250px;
      margin:10px auto;
      padding:12px;
      font-size:16px;
      border:none;
      border-radius:25px;
      background:#52b788;
      color:white;
      cursor:pointer;
    }

    .btn:hover {
      background:#2d6a4f;
    }
  </style>
</head>

<body>

<h2>🧭 Animal Journey</h2>
<p>Click an animal to explore its world 🌿</p>

<div class="container">

  <button class="btn" onclick="openAnimal('tiger')">🐯 Tiger</button>
  <button class="btn" onclick="openAnimal('elephant')">🐘 Elephant</button>
  <button class="btn" onclick="openAnimal('lion')">🦁 Lion</button>
  <button class="btn" onclick="openAnimal('giraffe')">🦒 Giraffe</button>
  <button class="btn" onclick="openAnimal('zebra')">🦓 Zebra</button>
  <button class="btn" onclick="openAnimal('fox')">🦊 Fox</button>

</div>

<br>
<a href="../menu.html">⬅ Back to Menu</a>

<script>
function openAnimal(animal){
  let url = "https://www.google.com/search?q=" + animal + "+animal+information";
  window.open(url, "_blank");
}
</script>

</body>
</html>
