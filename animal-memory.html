<!DOCTYPE html>
<html>
<head>
  <title>Animal Memory Game</title>
  <style>
    body {
      text-align:center;
      font-family:sans-serif;
      background:#eef7f0;
    }

    h2 { margin-top:10px; }

    #timer {
      font-size:18px;
      margin:10px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(4,80px);
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    .card {
      width:80px;
      height:80px;
      background:#52b788;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      cursor:pointer;
      border-radius:10px;
    }

    .flipped {
      background:#d8f3dc;
    }
  </style>
</head>

<body>

<h2>🧠 Animal Memory Game</h2>
<p>Match all pairs 🐾</p>

<p id="timer">⏳ Time: 0s</p>

<div class="grid" id="grid"></div>

<p id="msg"></p>

<a href="../menu.html">⬅ Back to Menu</a>

<script>
const animals = ["🐯","🐘","🦜","🐢","🦁","🐵","🐼","🦊"];

// duplicate for pairs
let cards = [...animals, ...animals];

// shuffle
cards.sort(()=>Math.random()-0.5);

let first = null;
let second = null;
let lock = false;
let matched = 0;

const grid = document.getElementById("grid");

// ⏳ timer
let time = 0;
let timer = setInterval(()=>{
  time++;
  document.getElementById("timer").innerText = "⏳ Time: " + time + "s";
},1000);

// create cards
cards.forEach((animal)=>{
  let div = document.createElement("div");
  div.className = "card";
  div.innerText = "?";

  div.onclick = function(){

    if(lock || div.classList.contains("flipped")) return;

    div.innerText = animal;
    div.classList.add("flipped");

    if(!first){
      first = div;
    } else {
      second = div;
      lock = true;

      // check match
      if(first.innerText === second.innerText){
        matched += 2;
        first = null;
        second = null;
        lock = false;

        if(matched === cards.length){
          clearInterval(timer);
          document.getElementById("msg").innerText =
            "🎉 You matched all animals in " + time + " seconds!";
        }

      } else {
        setTimeout(()=>{
          first.innerText = "?";
          second.innerText = "?";
          first.classList.remove("flipped");
          second.classList.remove("flipped");

          first = null;
          second = null;
          lock = false;
        },800);
      }
    }
  };

  grid.appendChild(div);
});
</script>

</body>
</html>
