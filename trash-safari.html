<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🧹 Trash Smash Safari</title>

<style>
body {
  margin: 0;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(#1abc9c, #16a085);
  text-align: center;
}

.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: #2d3436;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  text-decoration: none;
}
.back-btn:hover { background: #00b894; }

.game-box {
  background: rgba(255,255,255,0.95);
  width: 90%;
  max-width: 700px;
  margin: 80px auto;
  padding: 25px;
  border-radius: 25px;
}

.lanes {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
}

.lane {
  width: 30%;
  height: 200px;
  background: #dff9fb;
  border-radius: 20px;
  font-size: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.lane:hover {
  transform: scale(1.05);
}

.info {
  font-size: 18px;
  margin-top: 15px;
}
</style>
</head>

<body>

<a href="../menu.html" class="back-btn">⬅ Back</a>

<div class="game-box">
  <h1>🧹 Trash Smash Safari</h1>
  <p>Smash trash 🗑️ | Save animals 🐾</p>

  <div class="lanes">
    <div class="lane" onclick="hit(0)"></div>
    <div class="lane" onclick="hit(1)"></div>
    <div class="lane" onclick="hit(2)"></div>
  </div>

  <div class="info">
    Score: <span id="score">0</span> |
   Attempts Left: <span id="attempts">5</span>

  </div>
</div>

<script>
const lanes = document.querySelectorAll(".lane");
const animals = ["🐒","🐘","🦜","🐯","🐢","🦌","🦏"];

let score = 0;
let attempts = 6;
let activeLane = -1;
let activeItem = "";
let speed = 1600;
let timer;
function spawn() {
  // Only lose attempt if MISSED TRASH
  if (activeLane !== -1 && activeItem === "🗑️") {
    attempts--;
    updateInfo();
    if (attempts <= 0) return endGame();
  }

  lanes.forEach(l => l.innerText = "");

  activeLane = Math.floor(Math.random() * 3);

  if (Math.random() < 0.6) {
    activeItem = "🗑️";
  } else {
    activeItem = animals[Math.floor(Math.random() * animals.length)];
  }

  lanes[activeLane].innerText = activeItem;
}



function hit(index) {
  if (activeLane === -1) return;

  if (index === activeLane) {
    if (activeItem === "🗑️") {
      score++;
    } else {
      attempts--;
    }
  } else {
    attempts--;
  }

  lanes.forEach(l => l.innerText = "");
  activeLane = -1;
  activeItem = "";

  updateInfo();
  if (attempts <= 0) endGame();
}

function updateInfo() {
  document.getElementById("score").innerText = score;
  document.getElementById("attempts").innerText = attempts;
}

function endGame() {
  clearInterval(timer);
  saveScore();
  alert(`🧹 Game Over!\nYour Score: ${score}`);
  window.location.href = "../menu.html";
}

function saveScore() {
  let data = JSON.parse(localStorage.getItem("gameData")) || {};
  data.trashSafari = Math.max(data.trashSafari || 0, score);
  localStorage.setItem("gameData", JSON.stringify(data));
}

timer = setInterval(() => {
  if (attempts > 0) spawn();
}, speed);
</script>

</body>
</html>
