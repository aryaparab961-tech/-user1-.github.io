<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌱 Plant & Protect</title>

<style>
body {
  margin: 0;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(#a8e063, #56ab2f);
  text-align: center;
  overflow: hidden;
}

.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: #2d3436;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  text-decoration: none;
  z-index: 100;
}
.back-btn:hover { background: #00b894; }

.game-box {
  background: rgba(255,255,255,0.95);
  width: 90%;
  max-width: 850px;
  margin: 70px auto;
  padding: 20px;
  border-radius: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.info {
  font-size: 20px;
  margin: 10px 0;
}

/* GARDEN */
.garden {
  position: relative;
  height: 380px;
  background: linear-gradient(#74b9ff, #55efc4);
  border-radius: 20px;
  overflow: hidden;
}

/* CLICKABLE FALLING ITEMS */
.item {
  position: absolute;
  font-size: 40px;
  cursor: pointer;
  user-select: none;
  z-index: 50;               /* 🔥 VERY IMPORTANT */
  pointer-events: auto;     /* 🔥 FORCE CLICK */
}

/* PLANT */
.plant {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 100px;
  z-index: 10;
  pointer-events: none;     /* plant NEVER blocks clicks */
}

/* FLOWERS */
.flower {
  position: absolute;
  bottom: 90px;
  font-size: 40px;
  z-index: 20;
  pointer-events: none;
}

/* CLAP */
.clap {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 40px;
  z-index: 30;
  pointer-events: none;
}
</style>
</head>

<body>

<a href="../menu.html" class="back-btn">⬅ Back</a>

<div class="game-box">
  <h1>🌱 Plant & Protect</h1>
  <p>Click good items 💧 ☀️ 🌧️ to grow the plant</p>

  <div class="info">
    Score: <span id="score">0</span>
  </div>

  <div class="garden" id="garden">
    <div class="plant" id="plant">🌱</div>
  </div>
</div>

<script>
const garden = document.getElementById("garden");
const plantEl = document.getElementById("plant");
const scoreEl = document.getElementById("score");

const goodItems = ["💧","☀️","🌧️"];
const badItems = ["🔥","🧪","🗑️"];
const plantStages = ["🌱","🌿","🌳","🌸"];

let plantLevel = 0;
let score = 0;
let flowerDone = false;

/* DROP ITEMS */
function dropItem() {
  const item = document.createElement("div");
  item.className = "item";

  const isGood = Math.random() < 0.65;
  item.innerText = isGood
    ? goodItems[Math.floor(Math.random() * goodItems.length)]
    : badItems[Math.floor(Math.random() * badItems.length)];

  item.dataset.good = isGood ? "1" : "0";
  item.style.left = Math.random() * 85 + "%";
  item.style.top = "-40px";

  garden.appendChild(item);

  let top = -40;
  const fall = setInterval(() => {
    top += 4;
    item.style.top = top + "px";

    if (top > 380) {
      clearInterval(fall);
      item.remove();
    }
  }, 30);

  /* CLICK WORKS 100% */
  item.addEventListener("click", () => {
    clearInterval(fall);

    if (item.dataset.good === "1") {
      growPlant();
    }

    item.remove();
  });
}

/* PLANT GROW */
function growPlant() {
  if (flowerDone) return;

  if (plantLevel < plantStages.length - 1) {
    plantLevel++;
    plantEl.innerText = plantStages[plantLevel];

    if (plantLevel === plantStages.length - 1) {
      bloom();
    }
  }
}

/* BLOOM */
function bloom() {
  flowerDone = true;
  score += 10;
  scoreEl.innerText = score;

  const clap = document.createElement("div");
  clap.className = "clap";
  clap.innerText = "👏👏";
  garden.appendChild(clap);

  setTimeout(() => clap.remove(), 2000);

  for (let i = 0; i < 5; i++) {
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerText = "🌼";
    flower.style.left = Math.random() * 80 + "%";
    garden.appendChild(flower);
  }

  setTimeout(resetPlant, 3000);
}

/* RESET */
function resetPlant() {
  plantLevel = 0;
  flowerDone = false;
  plantEl.innerText = "🌱";
  document.querySelectorAll(".flower").forEach(f => f.remove());
}

/* LOOP */
setInterval(dropItem, 1200);
</script>

</body>
</html>
