<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>♻️ Recycle Rush</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS", cursive;
  background: linear-gradient(#74b9ff,#00cec9);
  text-align:center;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#2d3436;
  color:white;
  padding:10px 18px;
  border-radius:25px;
  text-decoration:none;
}
.back-btn:hover{background:#0984e3;}

.game-box{
  background:rgba(255,255,255,0.95);
  width:90%;
  max-width:600px;
  margin:80px auto;
  padding:25px;
  border-radius:25px;
}

.info{
  font-size:20px;
  margin-bottom:10px;
}

.item-box{
  font-size:90px;
  margin:40px 0;
  transition:0.3s;
}

.shake{
  animation:shake 0.4s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-10px);}
  50%{transform:translateX(10px);}
  75%{transform:translateX(-10px);}
  100%{transform:translateX(0);}
}

.bins{
  display:flex;
  justify-content:space-around;
}

.bin{
  width:120px;
  height:90px;
  border-radius:20px;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.bin:hover{
  transform:scale(1.1);
}

.recycle{background:#55efc4;}
.compost{background:#ffeaa7;}
.trash{background:#fab1a0;}
</style>
</head>

<body>

<a href="../menu.html" class="back-btn">⬅ Back</a>

<div class="game-box">
  <h1>♻️ Recycle Rush</h1>
  <p>Tap the correct bin!</p>

  <div class="info">
    Score: <span id="score">0</span> |
    Attempts: <span id="attempts">5</span>
  </div>

  <div class="item-box" id="item">🧃</div>

  <div class="bins">
    <div class="bin recycle" onclick="choose('recycle')">♻️</div>
    <div class="bin compost" onclick="choose('compost')">🍃</div>
    <div class="bin trash" onclick="choose('trash')">🗑️</div>
  </div>
</div>

<script>
const scoreEl = document.getElementById("score");
const attemptsEl = document.getElementById("attempts");
const itemEl = document.getElementById("item");

let score = 0;
let attempts = 5;

const items = [
  {icon:"🧃", type:"recycle"},
  {icon:"📰", type:"recycle"},
  {icon:"🥫", type:"recycle"},
  {icon:"🍌", type:"compost"},
  {icon:"🍎", type:"compost"},
  {icon:"🍞", type:"compost"},
  {icon:"🔋", type:"trash"},
  {icon:"🧴", type:"trash"},
  {icon:"🧃", type:"trash"}
];

let currentItem = {};

function newItem(){
  currentItem = items[Math.floor(Math.random()*items.length)];
  itemEl.innerText = currentItem.icon;
}

function choose(bin){
  if(attempts <= 0) return;

  if(bin === currentItem.type){
    score += 1;
    scoreEl.innerText = score;
    newItem();
  }else{
    attempts--;
    attemptsEl.innerText = attempts;
    itemEl.classList.add("shake");
    setTimeout(()=>itemEl.classList.remove("shake"),400);
    if(attempts === 0){
      endGame();
    }
  }
}

function endGame(){
  alert(`♻️ Game Over!\nYour Score: ${score}`);
  window.location.href = "../menu.html";
}

newItem();
</script>

</body>
</html>
